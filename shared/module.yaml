product:
  type: kmp/lib
  platforms: [jvm]

dependencies:
  - $compose.foundation: exported
  - $compose.material3: exported
  - $compose.preview
  - androidx.datastore:datastore:1.2.1
  - androidx.datastore:datastore-core-okio:1.2.1
  - androidx.datastore:datastore-preferences:1.2.1
  - org.jetbrains.androidx.lifecycle:lifecycle-viewmodel-compose:2.10.0
  - org.jetbrains.androidx.lifecycle:lifecycle-viewmodel-navigation3:2.10.0
  - org.jetbrains.androidx.navigation3:navigation3-ui:1.1.1

dependencies@jvm:
  - $compose.desktop.currentOs
  - org.jetbrains.kotlinx:kotlinx-coroutines-swing:1.10.2
  - ai.koog:koog-agents:1.0.0
  - ai.koog:http-client-ktor:1.0.0
  - io.ktor:ktor-client-core:3.3.3
  - io.ktor:ktor-client-cio:3.3.3
  - org.slf4j:slf4j-simple:2.0.17

settings:
  compose:
    enabled: true
    resources:
      exposedAccessors: true
      packageName: cook.generated.resources
  kotlin:
    serialization: json
